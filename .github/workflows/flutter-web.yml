name: Flutter Web Build and Deploy

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write # Allows GitHub to publish the website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # THE MAGIC COMMAND: This tells Flutter to automatically generate 
      # the missing android/, ios/, and web/ boilerplate folders!
      - name: Repair Project Folders
        run: flutter create .

      - name: Build Web App
        run: flutter build web --release --base-href "/Nolpan/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web