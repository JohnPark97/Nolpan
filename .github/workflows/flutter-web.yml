name: Flutter Web Build and Deploy

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # <--- CRITICAL: Tells GitHub to use the frontend folder!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Repair Project Folders
        run: flutter create .

      - name: Build Web App
        run: flutter build web --release --base-href "/Nolpan/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build/web # <--- Publish from the correct output folder